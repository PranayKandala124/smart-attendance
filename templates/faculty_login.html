<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>Faculty Login | SmartAttend</title><link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}"/></head>
<body><div class="page-wrap">
<nav class="navbar"><a href="/" class="nav-brand"><div class="brand-ring">📡</div>Smart<span class="brand-acc">Attend</span></a><div class="nav-links"><a href="/faculty_signup" class="nl">Sign Up</a><a href="/student_login" class="nl nl-p">Student Login</a></div></nav>
<div class="auth-page"><div class="auth-card card a1">
  <span class="auth-icon">🏫</span>
  <h2>Faculty Login</h2><p class="sub">Access dashboard, generate per-student QR codes</p>
  {% if error %}<div class="alert a-err">⚠ {{ error }}</div>{% endif %}
  <form method="POST" action="/faculty_login">
    <div class="fg"><label class="flbl">Username</label><input class="finp" type="text" name="username" placeholder="Your faculty username" required/></div>
    <div class="fg"><label class="flbl">Password</label><input class="finp" type="password" name="password" placeholder="Your password" required/></div>
    <button type="submit" class="btn btn-p btn-block" style="margin-top:4px;">Sign In to Dashboard →</button>
  </form>
  <p class="auth-foot">New faculty? <a href="/faculty_signup">Register here</a></p>
</div></div>
<footer class="footer"><span>© 2025 SmartAttend</span><a href="/">← Home</a></footer>
</div></body></html>
